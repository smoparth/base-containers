# =============================================================================
# ODH Base Containers - ROCm 7.1 Build Arguments
# =============================================================================
#
# Build arguments for ROCm 7.1.x base image (AMD GPU workloads).
# This file is passed directly to podman/buildah via --build-arg-file.
#
# Source: https://repo.radeon.com/rocm/el9/7.1.1/main/
#
# Usage:
#   ./scripts/build.sh rocm-7.1
#
# =============================================================================

# -----------------------------------------------------------------------------
# Image Tag (used by build.sh)
# -----------------------------------------------------------------------------
IMAGE_TAG=7.1-py312

# Python version bundled with this ROCm image (used in container labels)
PYTHON_VERSION=3.12

# -----------------------------------------------------------------------------
# Base Image
# -----------------------------------------------------------------------------
# Use sclorg Python image on CentOS Stream 9 (same base as CUDA images)
# Digest is pinned for reproducible builds and auto-updated by Renovate
# Source: https://quay.io/repository/sclorg/python-312-c9s
BASE_IMAGE=quay.io/sclorg/python-312-c9s:c9s@sha256:6fec4978f2f3851ca63a477963c1d6cbc8927b651e49c63fddf354cd36723db6

# -----------------------------------------------------------------------------
# ROCm Versions
# Source: https://repo.radeon.com/rocm/el9/7.1.1/main/
# -----------------------------------------------------------------------------
ROCM_MAJOR=7
ROCM_MAJOR_MINOR=7-1
ROCM_MAJOR_MINOR_DOT=7.1
ROCM_VERSION=7.1.1

# RHEL minor version for AMDGPU/Graphics repo URLs.
# CentOS Stream 9 reports VERSION_ID=9 which has no matching AMD repo path,
# so we pin the specific minor version here.
# Source: https://repo.radeon.com/graphics/7.1.1/el/
RELEASEVER=9.6

# -----------------------------------------------------------------------------
# PyPI Indexes
# PyTorch publishes ROCm-specific wheels at the rocm7.1 index.
# -----------------------------------------------------------------------------
PIP_INDEX_URL=https://pypi.org/simple
PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/rocm7.1

# -----------------------------------------------------------------------------
# uv PyTorch Backend
# Tells uv which ROCm variant to select for PyTorch wheels (uv pip install).
# https://docs.astral.sh/uv/guides/integration/pytorch/
# -----------------------------------------------------------------------------
UV_TORCH_BACKEND=rocm7.1
