apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/base-containers?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push" && target_branch == "main" && (
        'python/3.12/**'.pathChanged() ||
        'requirements-build.txt'.pathChanged() ||
        'scripts/fix-permissions'.pathChanged() ||
        '.dockerignore'.pathChanged() ||
        '.tekton/odh-midstream-python-base-3-12-push.yaml'.pathChanged()
      )
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: odh-base-containers
    appstudio.openshift.io/component: odh-midstream-python-base-3-12
    pipelines.appstudio.openshift.io/type: build
  name: odh-midstream-python-base-3-12-on-push
  namespace: open-data-hub-tenant
spec:
  timeouts:
    pipeline: "2h0m0s"
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/odh-midstream-python-base-3-12:{{revision}}
  - name: build-platforms
    value:
    - linux/x86_64
  - name: dockerfile
    value: python/3.12/Containerfile
  - name: build-args-file
    value: python/3.12/app.conf
  pipelineRef:
    name: odh-base-containers-push
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-midstream-python-base-3-12
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
