# =============================================================================
# ODH Base Containers - CUDA 13.2 Build Arguments
# =============================================================================
#
# Build arguments for CUDA 13.2.x base image (GPU workloads).
# This file is passed directly to podman/buildah via --build-arg-file.
#
# Source: https://gitlab.com/nvidia/container-images/cuda/-/tree/master/dist/13.2.x
#
# Usage:
#   ./scripts/build.sh cuda-13.2
#
# =============================================================================

# -----------------------------------------------------------------------------
# Image Tag (used by build.sh)
# -----------------------------------------------------------------------------
IMAGE_TAG=13.2-py312

# Python version bundled with this CUDA image (used in container labels)
PYTHON_VERSION=3.12

# -----------------------------------------------------------------------------
# Base Image
# -----------------------------------------------------------------------------
# Use sclorg Python image on CentOS Stream 9 (UBI 9 lacks CUDA dependencies)
# Digest is pinned for reproducible builds and auto-updated by Renovate
# Source: https://quay.io/repository/sclorg/python-312-c9s
BASE_IMAGE=quay.io/sclorg/python-312-c9s:c9s@sha256:6fec4978f2f3851ca63a477963c1d6cbc8927b651e49c63fddf354cd36723db6

# -----------------------------------------------------------------------------
# CUDA Versions
# Source: https://gitlab.com/nvidia/container-images/cuda/-/tree/master/dist/13.2.x
# -----------------------------------------------------------------------------
CUDA_MAJOR=13
CUDA_MAJOR_MINOR=13-2
CUDA_MAJOR_MINOR_DOT=13.2
CUDA_VERSION=13.2.0
NV_CUDA_CUDART_VERSION=13.2.51-1
NV_CUDA_LIB_VERSION=13.2.0-1
NV_NVTX_VERSION=13.2.20-1

# -----------------------------------------------------------------------------
# NVIDIA Driver Requirements
# Defines compatible driver versions for nvidia-container-runtime
# Source: https://gitlab.com/nvidia/container-images/cuda/-/blob/master/dist/13.2.x/ubi9/base/Dockerfile
# -----------------------------------------------------------------------------
NVIDIA_REQUIRE_CUDA="cuda>=13.2 brand=unknown,driver>=535,driver<536 brand=grid,driver>=535,driver<536 brand=tesla,driver>=535,driver<536 brand=nvidia,driver>=535,driver<536 brand=quadro,driver>=535,driver<536 brand=quadrortx,driver>=535,driver<536 brand=nvidiartx,driver>=535,driver<536 brand=vapps,driver>=535,driver<536 brand=vpc,driver>=535,driver<536 brand=vcs,driver>=535,driver<536 brand=vws,driver>=535,driver<536 brand=cloudgaming,driver>=535,driver<536 brand=unknown,driver>=570,driver<571 brand=grid,driver>=570,driver<571 brand=tesla,driver>=570,driver<571 brand=nvidia,driver>=570,driver<571 brand=quadro,driver>=570,driver<571 brand=quadrortx,driver>=570,driver<571 brand=nvidiartx,driver>=570,driver<571 brand=vapps,driver>=570,driver<571 brand=vpc,driver>=570,driver<571 brand=vcs,driver>=570,driver<571 brand=vws,driver>=570,driver<571 brand=cloudgaming,driver>=570,driver<571 brand=unknown,driver>=580,driver<581 brand=grid,driver>=580,driver<581 brand=tesla,driver>=580,driver<581 brand=nvidia,driver>=580,driver<581 brand=quadro,driver>=580,driver<581 brand=quadrortx,driver>=580,driver<581 brand=nvidiartx,driver>=580,driver<581 brand=vapps,driver>=580,driver<581 brand=vpc,driver>=580,driver<581 brand=vcs,driver>=580,driver<581 brand=vws,driver>=580,driver<581 brand=cloudgaming,driver>=580,driver<581 brand=unknown,driver>=590,driver<591 brand=grid,driver>=590,driver<591 brand=tesla,driver>=590,driver<591 brand=nvidia,driver>=590,driver<591 brand=quadro,driver>=590,driver<591 brand=quadrortx,driver>=590,driver<591 brand=nvidiartx,driver>=590,driver<591 brand=vapps,driver>=590,driver<591 brand=vpc,driver>=590,driver<591 brand=vcs,driver>=590,driver<591 brand=vws,driver>=590,driver<591 brand=cloudgaming,driver>=590,driver<591"

# -----------------------------------------------------------------------------
# cuBLAS
# Source: https://gitlab.com/nvidia/container-images/cuda/-/blob/master/dist/13.2.x/ubi9/runtime/Dockerfile
# -----------------------------------------------------------------------------
NV_LIBCUBLAS_VERSION=13.3.0.5-1

# -----------------------------------------------------------------------------
# NPP (NVIDIA Performance Primitives)
# Source: https://gitlab.com/nvidia/container-images/cuda/-/blob/master/dist/13.2.x/ubi9/runtime/Dockerfile
# -----------------------------------------------------------------------------
NV_LIBNPP_VERSION=13.1.0.44-1

# -----------------------------------------------------------------------------
# NCCL (NVIDIA Collective Communications Library)
# Source: https://docs.nvidia.com/deeplearning/nccl/release-notes/rel_2-29-7.html
# -----------------------------------------------------------------------------
NV_LIBNCCL_VERSION=2.29.7
NV_LIBNCCL_PACKAGE_VERSION=2.29.7-1

# -----------------------------------------------------------------------------
# cuDNN (CUDA Deep Neural Network library)
# Source: https://gitlab.com/nvidia/container-images/cuda/-/blob/master/dist/13.2.x/ubi9/runtime/cudnn/Dockerfile
# -----------------------------------------------------------------------------
NV_CUDNN_VERSION=9.20.0.48-1

# -----------------------------------------------------------------------------
# CUPTI (CUDA Profiling Tools Interface)
# Required by PyTorch profiler; not present in NVIDIA images (ODH-specific).
# Source: https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/
# -----------------------------------------------------------------------------
NV_CUDA_CUPTI_VERSION=13.2.75-1

# -----------------------------------------------------------------------------
# cuSPARSELt (structured sparsity)
# Required by PyTorch sparse operations; not present in NVIDIA images (ODH-specific).
# Source: https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/
# -----------------------------------------------------------------------------
NV_LIBCUSPARSELT_VERSION=0.7.1.0-1

# -----------------------------------------------------------------------------
# cuDSS (direct sparse solver)
# Required by scientific/ML solvers; not present in NVIDIA images (ODH-specific).
# Source: https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/
# -----------------------------------------------------------------------------
NV_LIBCUDSS_VERSION=0.7.1.4-1

# -----------------------------------------------------------------------------
# PyPI Indexes
# Note: Using cu130 for CUDA 13.2 - PyTorch doesn't publish cu132 wheels.
# CUDA minor versions within the same major are compatible.
# -----------------------------------------------------------------------------
PIP_INDEX_URL=https://pypi.org/simple
PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu130

# -----------------------------------------------------------------------------
# uv PyTorch Backend
# Tells uv which CUDA variant to select for PyTorch wheels (uv pip install).
# https://docs.astral.sh/uv/guides/integration/pytorch/
# -----------------------------------------------------------------------------
UV_TORCH_BACKEND=cu130
